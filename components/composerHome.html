  <style>
    .component-row {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .text-input-demo {
      max-width: 600px;
      position: relative;
    }

    /* Autocomplete Dropdown Styles */
    .autocomplete-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background-color: var(--surface-popover);
      border: 1px solid var(--stroke-primary);
      border-radius: 12px;
      box-shadow: var(--shadow-home-composer);
      max-height: 400px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
    }

    .autocomplete-dropdown.show {
      display: block;
    }

    .autocomplete-suggestions {
      padding: 8px 0;
    }

    .suggestion-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      cursor: pointer;
      transition: background-color 0.15s ease;
      gap: 12px;
    }

    .suggestion-item:hover,
    .suggestion-item.selected {
      background-color: var(--button-ghost-hover);
    }

    .suggestion-icon-left {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: var(--content-tertiary);
    }

    .suggestion-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .suggestion-text {
      font-family: var(--font-family);
      font-size: 14px;
      line-height: 20px;
      letter-spacing: -0.01em;
      font-weight: var(--font-weight-medium);
      color: var(--content-primary);
    }

    .suggestion-text-secondary {
      font-family: var(--font-family);
      font-size: 12px;
      line-height: 16px;
      letter-spacing: 0;
      font-weight: var(--font-weight-medium);
      color: var(--content-tertiary);
    }

    .suggestion-text-bold {
      font-weight: var(--font-weight-semibold);
    }

    .suggestion-action {
      font-family: var(--font-family);
      font-size: 12px;
      line-height: 16px;
      letter-spacing: 0;
      font-weight: var(--font-weight-medium);
      color: var(--content-tertiary);
      flex-shrink: 0;
    }

    .suggestion-icon-right {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: var(--button-accent);
    }

    .autocomplete-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-top: 1px solid var(--stroke-primary);
      gap: 12px;
    }

    .autocomplete-navigation {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--content-tertiary);
    }

    .autocomplete-navigation-icon {
      width: 14px;
      height: 14px;
      color: var(--content-tertiary);
    }

    .autocomplete-action-button {
      margin-left: auto;
    }
  </style>

    const autocompleteDropdown = document.getElementById('autocomplete-dropdown');
    const sendButton = document.getElementById('send-button-home');
    let selectedIndex = 0;
    const suggestionItems = autocompleteDropdown.querySelectorAll('.suggestion-item');

    function updateSendButtonState() {
      const hasText = composerInput.value.trim().length > 0;
      sendButton.disabled = !hasText;
    }

    function showAutocomplete() {
      if (composerInput.value.trim().length > 0) {
        autocompleteDropdown.classList.add('show');
      } else {
        autocompleteDropdown.classList.remove('show');
      }
    }

    function updateSelection() {
      suggestionItems.forEach((item, index) => {
        if (index === selectedIndex) {
          item.classList.add('selected');
        } else {
          item.classList.remove('selected');
        }
      });
    }

    // Show/hide autocomplete on input
    composerInput.addEventListener('input', () => {
      updateSendButtonState();
      showAutocomplete();
      selectedIndex = 0;
      updateSelection();
    });

    // Keyboard navigation
    composerInput.addEventListener('keydown', (e) => {
      if (!autocompleteDropdown.classList.contains('show')) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIndex = Math.min(selectedIndex + 1, suggestionItems.length - 1);
        updateSelection();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIndex = Math.max(selectedIndex - 1, 0);
        updateSelection();
      } else if (e.key === 'Enter' && selectedIndex >= 0) {
        e.preventDefault();
        const selectedItem = suggestionItems[selectedIndex];
        if (selectedItem) {
          const text = selectedItem.querySelector('.suggestion-text').textContent.trim();
          composerInput.value = text;
          autocompleteDropdown.classList.remove('show');
          updateSendButtonState();
        }
      } else if (e.key === 'Escape') {
        autocompleteDropdown.classList.remove('show');
      }
    });

    // Click outside to close
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.text-input-demo')) {
        autocompleteDropdown.classList.remove('show');
      }
    });

    // Initial state
    updateSendButtonState();

    // Ask Attio Composer functionality
    const composerInputStandard = document.getElementById('composer-input');
    const sendButtonStandard = document.getElementById('send-button');

    function updateSendButtonStateStandard() {
      const hasText = composerInputStandard.value.trim().length > 0;
      sendButtonStandard.disabled = !hasText;
    }

    composerInputStandard.addEventListener('input', updateSendButtonStateStandard);
    updateSendButtonStateStandard();
  </script>
</body>
</html>
