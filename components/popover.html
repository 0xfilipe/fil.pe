  <script src="../scripts/script.js"></script>
  <script>
    // Page-specific: Drag and Drop functionality
    let draggedElement = null;
    let draggedGroup = null;

    document.querySelectorAll('.list-item[draggable="true"]').forEach(item => {
      item.addEventListener('dragstart', (e) => {
        draggedElement = item;
        draggedGroup = item.closest('.popover-item-group');
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/html', item.innerHTML);
      });

      item.addEventListener('dragend', (e) => {
        item.classList.remove('dragging');
        document.querySelectorAll('.list-item').forEach(i => i.classList.remove('drag-over'));
      });

      item.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        
        const afterElement = getDragAfterElement(draggedGroup, e.clientY);
        const dragging = document.querySelector('.dragging');
        
        if (afterElement == null) {
          draggedGroup.appendChild(dragging);
        } else {
          draggedGroup.insertBefore(dragging, afterElement);
        }
      });

      item.addEventListener('dragenter', (e) => {
        e.preventDefault();
        if (item !== draggedElement) {
          item.classList.add('drag-over');
        }
      });

      item.addEventListener('dragleave', (e) => {
        item.classList.remove('drag-over');
      });

      item.addEventListener('drop', (e) => {
        e.preventDefault();
        item.classList.remove('drag-over');
      });
    });

    function getDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll('.list-item:not(.dragging)')];
      
      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        
        if (offset < 0 && offset > closest.offset) {
          return { offset: offset, element: child };
        } else {
          return closest;
        }
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }
  </script>
