  </div>

  <a href="../index.html" class="back-button text-caption">

  <div class="container">
    <h1 class="page-title text-title-small">Ask Attio Composer</h1>

    <div class="components-section">

        <div class="component-row">
          <div class="text-input-demo">

                          <path d="M1.27038 11.2846L1.86574 12.3077C1.98945 12.523 2.16729 12.6923 2.37605 12.8154L4.50235 9.15381H0.249756C0.249756 9.39227 0.311612 9.63073 0.435324 9.84612L1.27038 11.2846Z" fill="#0066DA"/>

                      <span class="btn-text">Sonnet 4.5</span>

                  </div>
                  <div class="text-input-icon-buttons-wrapper">
                    <button class="icon-btn icon-btn-ghost icon-btn-size-28">
                      <span class="icon-btn-icon">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <g clip-path="url(#clip0_info_default)">

                          </g>
                          <defs>
                            <clipPath id="clip0_info_default">
                              <rect width="14" height="14" fill="white"/>
                            </clipPath>
                          </defs>
                        </svg>
                      </span>
                    </button>
                    <button id="send-button" class="icon-btn icon-btn-primary icon-btn-size-28" disabled>
                      <span class="icon-btn-icon">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <path d="M6.72485 2.08154C6.91887 1.9537 7.18301 1.97532 7.35376 2.146L10.8538 5.646L10.9182 5.72412C11.0463 5.91806 11.0243 6.18215 10.8538 6.35303C10.6829 6.52389 10.4189 6.54564 10.2249 6.41748L10.1467 6.35303L7.50024 3.70654V11.4995C7.50024 11.7756 7.27625 11.9994 7.00024 11.9995C6.7241 11.9995 6.50024 11.7757 6.50024 11.4995V3.70654L3.85376 6.35303C3.6585 6.54829 3.34199 6.54829 3.14673 6.35303C2.95154 6.15776 2.95149 5.84123 3.14673 5.646L6.64673 2.146L6.72485 2.08154Z" fill="currentColor"/>

                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('theme') || 
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);

    // Control send button state based on composer input
    const composerInput = document.getElementById('composer-input');
    const sendButton = document.getElementById('send-button');

    function updateSendButtonState() {
      const hasText = composerInput.value.trim().length > 0;
      sendButton.disabled = !hasText;
    }

    // Check on input
    composerInput.addEventListener('input', updateSendButtonState);
    
    // Initial state check
    updateSendButtonState();
  </script>
</body>
</html>
