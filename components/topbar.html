<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topbar - Design System</title>
  <link rel="stylesheet" href="../tokens/colors.css">
  <link rel="stylesheet" href="../tokens/typography.css">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="topbar.css">
  <link rel="stylesheet" href="button.css">
  <link rel="stylesheet" href="iconButton.css">
  <style>
    .theme-toggle-wrapper {
      flex-direction: column;
      align-items: flex-end;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-toggle {
      width: 24px;
      height: 16px;
      background-color: var(--stroke-border-strong);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      padding: 2px;
    }

    .icon-toggle.active {
      background-color: var(--button-accent);
    }

    [data-theme="dark"] .icon-toggle.active {
      background-color: var(--button-accent);
    }

    .icon-toggle-slider {
      width: 12px;
      height: 12px;
      background-color: var(--content-on-accent);
      border-radius: 50%;
      transition: transform 0.2s ease;
      position: absolute;
      top: 50%;
      left: 2px;
      transform: translateY(-50%);
    }

    .icon-toggle.active .icon-toggle-slider {
      transform: translateY(-50%) translateX(8px);
    }

    /* Topbar variations */
    .topbar-divider {
      width: 1px;
      height: 14px;
      background-color: var(--stroke-primary);
      display: none;
    }

    /* Divider só aparece quando Share está visível E Help está visível */
    .show-share.show-help .topbar-divider {
      display: block;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Por padrão, Help aparece como botão normal */
    .help-button-normal {
      display: inline-flex;
    }

    .help-button-icon-only {
      display: none;
    }

    /* Quando Help NÃO está visível, esconde ambos */
    .topbar:not(.show-help) .help-button-normal,
    .topbar:not(.show-help) .help-button-icon-only {
      display: none;
    }

    /* Quando Help está visível E Options está ativo, mostra icon button */
    .topbar.show-help.show-options .help-button-normal {
      display: none;
    }

    .topbar.show-help.show-options .help-button-icon-only {
      display: inline-flex;
    }

    /* Quando Help está visível MAS Options NÃO está ativo, mostra botão normal */
    .topbar.show-help:not(.show-options) .help-button-normal {
      display: inline-flex;
    }

    .topbar.show-help:not(.show-options) .help-button-icon-only {
      display: none;
    }

    .ask-attio-button {
      display: inline-flex;
    }

    .hide-ask-attio .ask-attio-button {
      display: none;
    }

    .options-button-group {
      display: none;
      align-items: center;
      gap: 1px;
    }

    .show-options .options-button-group {
      display: flex;
    }

    .share-button-wrapper {
      display: none;
      align-items: center;
      gap: 8px;
    }

    .show-share .share-button-wrapper {
      display: flex;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      color: var(--content-primary);
    }

    .subtitle {
      color: var(--content-secondary);
      margin-bottom: 40px;
    }

    .topbar-demo {
      position: relative;
      border: none;
      border-radius: 0;
      overflow: hidden;
      background-color: var(--surface-primary);
    }

    .topbar-demo .topbar {
      position: relative;
      border-radius: 0;
    }
  </style>
</head>
<body>
  <div class="theme-toggle-wrapper">
    <div class="toggle-group">
      <span class="theme-toggle-label text-caption">Dark Mode</span>
      <button class="theme-toggle" onclick="toggleTheme()">
        <div class="theme-toggle-slider"></div>
      </button>
    </div>
    <div class="toggle-group">
      <span class="theme-toggle-label text-caption">Options</span>
      <button class="icon-toggle active" id="optionsToggle" onclick="toggleOptions()">
        <div class="icon-toggle-slider"></div>
      </button>
    </div>
    <div class="toggle-group">
      <span class="theme-toggle-label text-caption">Share</span>
      <button class="icon-toggle active" id="shareToggle" onclick="toggleShare()">
        <div class="icon-toggle-slider"></div>
      </button>
    </div>
    <div class="toggle-group">
      <span class="theme-toggle-label text-caption">Help</span>
      <button class="icon-toggle active" id="helpToggle" onclick="toggleHelp()">
        <div class="icon-toggle-slider"></div>
      </button>
    </div>
    <div class="toggle-group">
      <span class="theme-toggle-label text-caption">Ask Attio</span>
      <button class="icon-toggle active" id="askAttioToggle" onclick="toggleAskAttio()">
        <div class="icon-toggle-slider"></div>
      </button>
    </div>

  <script>
    function toggleOptions() {
      const toggle = document.getElementById('optionsToggle');
      const topbar = document.querySelector('.topbar');
      toggle.classList.toggle('active');
      topbar.classList.toggle('show-options');
      localStorage.setItem('optionsVisible', toggle.classList.contains('active'));
    }

    function toggleShare() {
      const toggle = document.getElementById('shareToggle');
      const topbar = document.querySelector('.topbar');
      toggle.classList.toggle('active');
      topbar.classList.toggle('show-share');
      localStorage.setItem('shareVisible', toggle.classList.contains('active'));
    }

    function toggleHelp() {
      const toggle = document.getElementById('helpToggle');
      const topbar = document.querySelector('.topbar');
      toggle.classList.toggle('active');
      topbar.classList.toggle('show-help');
      localStorage.setItem('helpVisible', toggle.classList.contains('active'));
    }

    function toggleAskAttio() {
      const toggle = document.getElementById('askAttioToggle');
      const topbar = document.querySelector('.topbar');
      toggle.classList.toggle('active');
      topbar.classList.toggle('hide-ask-attio');
      localStorage.setItem('askAttioVisible', toggle.classList.contains('active'));
    }

    // Load saved visibility states
    const optionsVisible = localStorage.getItem('optionsVisible') !== 'false';
    const shareVisible = localStorage.getItem('shareVisible') !== 'false';
    const helpVisible = localStorage.getItem('helpVisible') !== 'false';
    const askAttioVisible = localStorage.getItem('askAttioVisible') !== 'false';
    
    const topbar = document.querySelector('.topbar');
    
    // Por padrão, Help está visível (se não foi desativado explicitamente)
    if (helpVisible !== false) {
      document.getElementById('helpToggle').classList.add('active');
      topbar.classList.add('show-help');
    }
    
    if (optionsVisible) {
      document.getElementById('optionsToggle').classList.add('active');
      topbar.classList.add('show-options');
    }
    
    if (shareVisible) {
      document.getElementById('shareToggle').classList.add('active');
      topbar.classList.add('show-share');
    }

    // Por padrão, Ask Attio está visível (se não foi desativado explicitamente)
    if (askAttioVisible === false) {
      document.getElementById('askAttioToggle').classList.remove('active');
      topbar.classList.add('hide-ask-attio');
    } else {
      document.getElementById('askAttioToggle').classList.add('active');
    }
  </script>
</body>
</html>
