<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar - Design System</title>
  <link rel="stylesheet" href="../tokens/colors.css">
  <link rel="stylesheet" href="../tokens/typography.css">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="avatar.css">
  <style>
    .container {
      max-width: 1200px;
    }
  </style>
</head>
<body>
  <div class="theme-toggle-wrapper">
    <span class="theme-toggle-label text-caption">Dark Mode</span>
    <button class="theme-toggle" onclick="toggleTheme()">
      <div class="theme-toggle-slider"></div>
    </button>
  </div>

  <a href="../index.html" class="back-button text-caption">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5.72424 3.08191C5.9182 2.95382 6.18228 2.97579 6.35315 3.14636C6.52401 3.31723 6.54577 3.58119 6.4176 3.77527L6.35315 3.85339L3.70667 6.49988H11.4996C11.7757 6.49988 11.9995 6.72381 11.9996 6.99988C11.9996 7.27602 11.7758 7.49988 11.4996 7.49988H3.70667L6.35315 10.1464C6.54841 10.3416 6.54841 10.6581 6.35315 10.8534C6.15788 11.0485 5.84133 11.0486 5.64612 10.8534L2.14612 7.35339L2.08167 7.27527C1.95378 7.08128 1.97549 6.81713 2.14612 6.64636L5.64612 3.14636L5.72424 3.08191Z" fill="currentColor"/>
    </svg>
    Back
  </a>

  <div class="container">
    <h1 class="page-title text-title">Avatar</h1>
    <p class="avatar-demo-note text-body">Tamanhos e variantes baseados no node do design system no Figma, adaptados ao setup atual em HTML/CSS.</p>

    <div class="components-section">
      <div class="component-group">
        <div class="component-label text-caption">Preview</div>
        <div class="avatar-showcase" id="avatarShowcase"></div>
      </div>
    </div>
  </div>

  <script src="../scripts/script.js"></script>
  <script>
    const avatarSizes = [12, 14, 16, 20, 24, 32, 40, 56, 72];
    const avatarRows = [
      { label: 'Image / Circle', type: 'image', shape: 'circle', src: '../assets/linear-61ecfcab-65ab-4a77-af28-7dbd820b0ce1.png', alt: 'Linear' },
      { label: 'Initial / Circle', type: 'initial', shape: 'circle', text: 'A' },
      { label: 'Icon / Accent', type: 'icon-accent', shape: 'square', icon: 'brand' },
      { label: 'Icon / Subtle', type: 'icon-subtle', shape: 'square', icon: 'user' },
      { label: 'Initial / Square', type: 'initial', shape: 'square', text: 'A' },
      { label: 'Empty / Square', type: 'empty', shape: 'square', icon: 'user' },
      { label: 'Empty / Circle', type: 'empty', shape: 'circle', icon: 'user' }
    ];

    function createBrandIcon() {
      return `
        <svg class="avatar__icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="1.5" y="1.5" width="4" height="4" rx="1"/>
          <rect x="5.75" y="4.75" width="4.75" height="4.75" rx="1"/>
          <rect x="1.5" y="8.5" width="4" height="4" rx="1"/>
          <rect x="8.5" y="1.5" width="4" height="4" rx="1"/>
          <rect x="8.5" y="8.5" width="4" height="4" rx="1"/>
        </svg>
      `;
    }

    function createUserIcon() {
      return `
        <svg class="avatar__icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7 2.25C8.24265 2.25 9.25 3.25736 9.25 4.5C9.25 5.74264 8.24265 6.75 7 6.75C5.75736 6.75 4.75 5.74264 4.75 4.5C4.75 3.25736 5.75736 2.25 7 2.25Z" fill="currentColor"/>
          <path d="M4.32052 8.125H9.67948C10.9826 8.125 12.0391 9.18158 12.0391 10.4847C12.0391 10.9461 11.6651 11.3201 11.2037 11.3201H2.79633C2.33495 11.3201 1.96094 10.9461 1.96094 10.4847C1.96094 9.18158 3.01742 8.125 4.32052 8.125Z" fill="currentColor"/>
        </svg>
      `;
    }

    function createAvatar(row, size) {
      const classes = [
        'avatar',
        `avatar--size-${size}`,
        row.shape === 'square' ? 'avatar--square' : 'avatar--circle'
      ];

      let content = '';

      if (row.type === 'image') {
        classes.push('avatar--image');
        content = `<img src="${row.src}" alt="${row.alt || ''}">`;
      }

      if (row.type === 'initial') {
        classes.push('avatar--initial');
        const tightClass = size === 56 ? ' avatar__text--tight' : '';
        content = `<span class="avatar__text${tightClass}">${row.text || 'A'}</span>`;
      }

      if (row.type === 'icon-accent') {
        classes.push('avatar--icon-accent');
        content = row.icon === 'user' ? createUserIcon() : createBrandIcon();
      }

      if (row.type === 'icon-subtle') {
        classes.push('avatar--icon-subtle');
        content = row.icon === 'brand' ? createBrandIcon() : createUserIcon();
      }

      if (row.type === 'empty') {
        classes.push('avatar--empty');
        content = row.icon === 'brand' ? createBrandIcon() : createUserIcon();
      }

      return `<div class="avatar-demo-cell"><div class="${classes.join(' ')}">${content}</div></div>`;
    }

    function renderAvatarShowcase() {
      const showcase = document.getElementById('avatarShowcase');

      const header = `
        <div class="avatar-showcase-header">
          <div class="avatar-showcase-header-label text-caption">Variant</div>
          <div class="avatar-showcase-sizes">
            ${avatarSizes.map((size) => `<div class="avatar-showcase-size text-caption">${size}</div>`).join('')}
          </div>
        </div>
      `;

      const rows = avatarRows.map((row) => `
        <div class="avatar-showcase-row">
          <div class="avatar-showcase-row-label text-body">${row.label}</div>
          <div class="avatar-showcase-items">
            ${avatarSizes.map((size) => createAvatar(row, size)).join('')}
          </div>
        </div>
      `).join('');

      showcase.innerHTML = header + rows;
    }

    renderAvatarShowcase();
  </script>
</body>
</html>
