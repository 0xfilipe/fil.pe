<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icons - Design System</title>
  <link rel="stylesheet" href="../tokens/colors.css">
  <link rel="stylesheet" href="../tokens/typography.css">
  <link rel="stylesheet" href="../tokens/shadows.css">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
</head>
<body>
  <div class="theme-toggle-wrapper">
    <span class="theme-toggle-label text-caption">Dark Mode</span>
    <button class="theme-toggle" onclick="toggleTheme()">
      <div class="theme-toggle-slider"></div>
    </button>
  </div>

  <a href="../index.html" class="back-button text-caption">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5.72424 3.08191C5.9182 2.95382 6.18228 2.97579 6.35315 3.14636C6.52401 3.31723 6.54577 3.58119 6.4176 3.77527L6.35315 3.85339L3.70667 6.49988H11.4996C11.7757 6.49988 11.9995 6.72381 11.9996 6.99988C11.9996 7.27602 11.7758 7.49988 11.4996 7.49988H3.70667L6.35315 10.1464C6.54841 10.3416 6.54841 10.6581 6.35315 10.8534C6.15788 11.0485 5.84133 11.0486 5.64612 10.8534L2.14612 7.35339L2.08167 7.27527C1.95378 7.08128 1.97549 6.81713 2.14612 6.64636L5.64612 3.14636L5.72424 3.08191Z" fill="currentColor"/>
    </svg>
    Back
  </a>

  <div class="container">
    <h1 class="page-title text-title">Icons</h1>

    <div id="icons-container"></div>
  </div>

  <div id="copy-toast" class="toast text-caption">Copied!</div>

  <script src="../scripts/script.js"></script>
  <script>
    // 12px Line icons
    const icons12Line = ['Activity', 'Ai-color', 'Ai', 'Apps', 'Arrow-down-left', 'Arrow-down-right', 'Arrow-down', 'Arrow-left', 'Arrow-right', 'Arrow-up-left', 'Arrow-up-right', 'Arrow-up', 'Arrows-refresh', 'At', 'Attachment', 'Attributes-plus', 'Attributes', 'AWAC', 'Bar-chart', 'Brackets-cross', 'Branch-down', 'Calendar-arrow-left', 'Calendar-arrow-one', 'Calendar-arrow-right', 'Calendar-clock', 'Calendar-day', 'Calendar', 'Change', 'Chevron-down', 'Chevron-left', 'Chevron-right', 'Chevron-up', 'Clock-delay', 'Clock', 'Columns', 'Command', 'Comment', 'Comments', 'Company-plus', 'Company', 'Confetti', 'Copy', 'Cross-circle', 'Cross', 'Dashboard-plus', 'Dashboard', 'Data-text', 'Dots-vertical', 'Download', 'Email-draft', 'Email-mass', 'Email-template-plus', 'Email-template', 'Email', 'Enter', 'Equals', 'Excel', 'Expand-screen', 'Eye-hide', 'Eye', 'File-CSV', 'Filter-funnel', 'First-email-interaction', 'Flask', 'Funnel-chart', 'Funnel-steps-chart', 'Grid', 'Hashtag', 'Headset', 'Help-drawer', 'Import-export', 'Info-circle', 'Key', 'Line-chart', 'List-command', 'List-plus', 'List-search-1', 'List-search', 'List', 'Loading', 'Locked', 'Map-chart', 'Merge', 'Minus-square', 'Mobile phone', 'Next-email-interaction', 'None', 'Note-template', 'Note', 'Object', 'Pause', 'Phone-arrow-left', 'Phone-arrow-right', 'Phone-cancel', 'Phone-cross', 'Phone-inbound', 'Phone-outbound', 'Pie-chart', 'Placeholder', 'Play', 'Plus-square', 'Prompt-completion', 'Record-detail-edit', 'Record-detail', 'Record', 'Refresh', 'Report', 'Ring-bell', 'Rows', 'Sales', 'Search', 'Self-served', 'Send', 'Settings-arrow-right', 'Settings', 'Single-metric-chart', 'Status', 'Strikethrough', 'Switch', 'Table', 'Templates', 'Test-tube', 'Trash', 'Trigger', 'Upgrade', 'User-bolt', 'User-plus', 'User', 'Users', 'Video-camera', 'View-plus', 'Warning-triangle', 'Webhooks', 'Workflow-credit', 'Workflow-run', 'Workflows', 'Workspace'];

    // Cache for loaded SVGs
    const svgCache = {};

    async function loadSvg(size, type, name) {
      const path = `../icons/${size}/${type}/${name}.svg`;
      const cacheKey = path;
      
      if (svgCache[cacheKey]) {
        return svgCache[cacheKey];
      }

      try {
        const response = await fetch(path);
        if (!response.ok) throw new Error('Failed to load');
        const svgText = await response.text();
        svgCache[cacheKey] = svgText;
        return svgText;
      } catch (e) {
        console.error(`Failed to load icon: ${path}`, e);
        return null;
      }
    }

    function showToast(message) {
      const toast = document.getElementById('copy-toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    async function copyIconSvg(size, type, name) {
      const svg = await loadSvg(size, type, name);
      if (svg) {
        navigator.clipboard.writeText(svg).then(() => {
          showToast(`Copied ${name}`);
        }).catch(err => {
          console.error('Failed to copy:', err);
        });
      }
    }

    function createIconCard(size, type, name) {
      return `
        <div class="icon-card" onclick="copyIconSvg('${size}', '${type}', '${name}')">
          <span class="tooltip text-caption">Copy</span>
          <div class="icon-square icon-size-${size}">
            <div class="icon-placeholder" data-size="${size}" data-type="${type}" data-name="${name}"></div>
          </div>
        </div>
      `;
    }

    function createSizeSection(size, icons) {
      return `
        <div class="icon-size-section">
          <h2 class="icon-size-title text-title-extra-small">${size}px Icons</h2>
          <div class="icons-grid">
            ${icons.map(name => createIconCard(size, 'Line', name)).join('')}
          </div>
        </div>
      `;
    }

    async function loadIconsIntoPlaceholders() {
      const placeholders = document.querySelectorAll('.icon-placeholder');
      
      for (const placeholder of placeholders) {
        const size = placeholder.dataset.size;
        const type = placeholder.dataset.type;
        const name = placeholder.dataset.name;
        
        const svg = await loadSvg(size, type, name);
        if (svg) {
          placeholder.innerHTML = svg;
        }
      }
    }

    async function renderIcons() {
      const container = document.getElementById('icons-container');
      
      let html = '';
      
      // 12px Line icons
      html += createSizeSection('12', icons12Line);
      
      // 14px Line icons
      const icons14Line = await getIconList('14', 'Line');
      html += createSizeSection('14', icons14Line);
      
      container.innerHTML = html;
      
      // Load SVGs into placeholders
      await loadIconsIntoPlaceholders();
    }

    async function getIconList(size, type) {
      // 14px Line icons
      const icons14Line = ['Activity', 'Ai-color', 'Ai', 'Align-center', 'Align-left', 'Align-right', 'Archive', 'Arrow-down-left', 'Arrow-down-right', 'Arrow-down', 'Arrow-left', 'Arrow-right', 'Arrow-up-left', 'Arrow-up-right', 'Arrow-up', 'Arrows-refresh', 'At', 'Attachment', 'Attributes-plus', 'Attributes', 'AWAC', 'Bar-chart', 'Bold', 'Bookmark', 'Brackets-cross', 'Branch-down', 'Calendar-arrow-left', 'Calendar-arrow-one', 'Calendar-arrow-right', 'Calendar-clock', 'Calendar-day', 'Calendar', 'Change', 'Check-circle', 'Check', 'Chevron-down', 'Chevron-left', 'Chevron-right', 'Chevron-up', 'Clock-delay', 'Clock', 'Code', 'Columns', 'Command', 'Comment', 'Comments', 'Company-plus', 'Company', 'Confetti', 'Copy', 'Cross-circle', 'Cross', 'Dashboard-plus', 'Dashboard', 'Data-text', 'Dots-horizontal', 'Dots-vertical', 'Download', 'Drag-handle', 'Edit', 'Email-draft', 'Email-mass', 'Email-template-plus', 'Email-template', 'Email', 'Enter', 'Equals', 'Excel', 'Expand-screen', 'External-link', 'Eye-hide', 'Eye', 'File-CSV', 'Filter-funnel', 'First-email-interaction', 'Flask', 'Folder', 'Funnel-chart', 'Funnel-steps-chart', 'Globe', 'Grid', 'Hashtag', 'Headset', 'Heart', 'Help-drawer', 'Home', 'Image', 'Import-export', 'Info-circle', 'Italic', 'Key', 'Line-chart', 'Link', 'List-bullets', 'List-command', 'List-numbers', 'List-plus', 'List-search-1', 'List-search', 'List', 'Loading', 'Locked', 'Map-chart', 'Merge', 'Minus-square', 'Minus', 'Mobile-phone', 'Next-email-interaction', 'None', 'Note-template', 'Note', 'Object', 'Pause', 'Phone-arrow-left', 'Phone-arrow-right', 'Phone-cancel', 'Phone-cross', 'Phone-inbound', 'Phone-outbound', 'Pie-chart', 'Pin', 'Placeholder', 'Play', 'Plus-square', 'Plus', 'Prompt-completion', 'Quote', 'Record-detail-edit', 'Record-detail', 'Record', 'Redo', 'Refresh', 'Report', 'Ring-bell', 'Rows', 'Sales', 'Search', 'Self-served', 'Send', 'Settings-arrow-right', 'Settings', 'Share', 'Single-metric-chart', 'Sort', 'Sparkle', 'Star', 'Status', 'Strikethrough', 'Switch', 'Table', 'Templates', 'Test-tube', 'Trash', 'Trigger', 'Underline', 'Undo', 'Unlocked', 'Upgrade', 'Upload', 'User-bolt', 'User-plus', 'User', 'Users', 'Video-camera', 'View-plus', 'Warning-triangle', 'Webhooks', 'Workflow-credit', 'Workflow-run', 'Workflows', 'Workspace'];
      
      if (size === '14' && type === 'Line') {
        return icons14Line;
      }
      return [];
    }

    // Initialize
    renderIcons();
  </script>
</body>
</html>
