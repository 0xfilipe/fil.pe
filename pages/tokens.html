<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Tokens - Design System</title>
  <link rel="stylesheet" href="../tokens/colors.css">
  <link rel="stylesheet" href="../tokens/typography.css">
  <link rel="stylesheet" href="../tokens/shadows.css">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <style>
    .token-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      min-height: 48px;
      cursor: pointer;
    }

    .token-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .token-value-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .token-swatch {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
    }

    [data-theme="dark"] .token-swatch {
      border-color: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div class="theme-toggle-wrapper">
    <span class="theme-toggle-label text-caption">Dark Mode</span>
    <button class="theme-toggle" onclick="toggleTheme()">
      <div class="theme-toggle-slider"></div>
    </button>
  </div>

  <a href="../attio.html" class="back-button text-caption">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5.72424 3.08191C5.9182 2.95382 6.18228 2.97579 6.35315 3.14636C6.52401 3.31723 6.54577 3.58119 6.4176 3.77527L6.35315 3.85339L3.70667 6.49988H11.4996C11.7757 6.49988 11.9995 6.72381 11.9996 6.99988C11.9996 7.27602 11.7758 7.49988 11.4996 7.49988H3.70667L6.35315 10.1464C6.54841 10.3416 6.54841 10.6581 6.35315 10.8534C6.15788 11.0485 5.84133 11.0486 5.64612 10.8534L2.14612 7.35339L2.08167 7.27527C1.95378 7.08128 1.97549 6.81713 2.14612 6.64636L5.64612 3.14636L5.72424 3.08191Z" fill="currentColor"/>
    </svg>
    Back
  </a>

  <div class="container">
    <h1 class="page-title text-title">Color Tokens</h1>

    <div class="components-section" id="tokens-container"></div>
  </div>

  <div id="token-toast" class="toast text-caption"></div>

  <script src="../scripts/script.js"></script>
  <script>
    // Semantic token categories
    const tokenCategories = {
      'Surface': [
        '--surface-primary', '--surface-primary-transparent', '--surface-primary-hover',
        '--surface-secondary', '--surface-secondary-transparent', '--surface-secondary-hover',
        '--surface-tertiary', '--surface-tertiary-hover', '--surface-quaternary',
        '--surface-accent', '--surface-accent-selected', '--surface-accent-selected-subtle',
        '--surface-popover', '--surface-popover-hover', '--surface-editor',
        '--surface-accent-subtle', '--surface-enriched', '--surface-floating',
        '--surface-floating-hover', '--surface-overlay', '--surface-overlay-strong',
        '--surface-frame', '--surface-frame-overlay', '--surface-info-subtle',
        '--surface-success-subtle', '--surface-warning-subtle', '--surface-critical-subtle',
        '--surface-tint'
      ],
      'Button': [
        '--button-accent', '--button-accent-hover', '--button-accent-subtle',
        '--button-critical', '--button-critical-hover', '--button-critical-subtle',
        '--button-secondary', '--button-secondary-hover',
        '--button-ghost', '--button-ghost-hover', '--button-ghost-hover-subtle',
        '--button-frame', '--button-frame-hover'
      ],
      'Content': [
        '--content-primary', '--content-secondary', '--content-tertiary', '--content-quaternary',
        '--content-accent', '--content-on-accent', '--content-floating-primary',
        '--content-inverse', '--content-info', '--content-success', '--content-critical',
        '--content-warning', '--content-on-info-subtle', '--content-on-success-subtle',
        '--content-on-warning-subtle', '--content-on-critical-subtle', '--content-ghost'
      ],
      'Stroke': [
        '--stroke-primary', '--stroke-secondary', '--stroke-tertiary',
        '--stroke-primary-subtle', '--stroke-primary-transparent', '--stroke-border-strong',
        '--stroke-border-ghost', '--stroke-popover', '--stroke-frame-border',
        '--stroke-frame-button-border', '--stroke-accent', '--stroke-accent-subtle',
        '--stroke-on-accent', '--stroke-info', '--stroke-success', '--stroke-warning',
        '--stroke-critical', '--stroke-floating-primary', '--stroke-floating-secondary',
        '--stroke-floating-tertiary'
      ]
    };

    // Palette hex values for reverse lookup
    const paletteColors = {
      '#FFFFFF': 'grey-00', '#FBFBFB': 'grey-01', '#F8F9FA': 'grey-02',
      '#F1F2F3': 'grey-03', '#EEEFF1': 'grey-04', '#E6E7EA': 'grey-05',
      '#CDCED2': 'grey-06', '#A2A4A7': 'grey-07', '#898A8D': 'grey-08',
      '#77797C': 'grey-09', '#505155': 'grey-10', '#45474B': 'grey-11',
      '#2F3033': 'grey-12', '#292A2E': 'grey-13', '#242629': 'grey-14',
      '#202124': 'grey-15', '#1C1D1F': 'grey-16', '#17181A': 'grey-17',
      '#000000': 'grey-18',
      '#E5EEFF': 'blue-01', '#D6E5FF': 'blue-02', '#C2D6FF': 'blue-03',
      '#80ACFF': 'blue-04', '#4E8CFC': 'blue-05', '#266DF0': 'blue-06',
      '#215BC4': 'blue-07', '#2B3E6D': 'blue-08', '#1D2E55': 'blue-09',
      '#FFEBEB': 'red-01', '#FFDCDB': 'red-02', '#FFD1D1': 'red-03',
      '#FF8180': 'red-04', '#FF5454': 'red-05', '#ED3B3B': 'red-06',
      '#BA2525': 'red-07', '#692623': 'red-08', '#4E1B28': 'red-09',
      '#FDF7C4': 'amber-01', '#FCEF7E': 'amber-02', '#F5E242': 'amber-03',
      '#CFB700': 'amber-04', '#A89500': 'amber-05', '#8C7D00': 'amber-06',
      '#665A00': 'amber-07', '#423E17': 'amber-08', '#373313': 'amber-09',
      '#E0FCED': 'green-01', '#CBF7E1': 'green-02', '#A7F2CF': 'green-03',
      '#4AD99A': 'green-04', '#00D17E': 'green-05', '#02AD6E': 'green-06',
      '#007D53': 'green-07', '#244A3A': 'green-08', '#1D4034': 'green-09',
      '#DDF7FF': 'cyan-01', '#D0EFF7': 'cyan-02', '#A9EBFC': 'cyan-03',
      '#40CFF5': 'cyan-04', '#00B9EB': 'cyan-05', '#0D99BD': 'cyan-06',
      '#056C87': 'cyan-07', '#0A4E6B': 'cyan-08', '#1A3946': 'cyan-09',
      '#FDEDFF': 'lavender-01', '#FAD6FF': 'lavender-02', '#F6BDFC': 'lavender-03',
      '#F16BFF': 'lavender-04', '#DB4BEB': 'lavender-05', '#CD33DE': 'lavender-06',
      '#9C1BAB': 'lavender-07', '#5C2169': 'lavender-08', '#431B4B': 'lavender-09',
      '#F4FBCB': 'lime-01', '#E9F797': 'lime-02', '#D7EB67': 'lime-03',
      '#AABF2A': 'lime-04', '#89A100': 'lime-05', '#748700': 'lime-06',
      '#536300': 'lime-07', '#3B4217': 'lime-08', '#2F3802': 'lime-09',
      '#FEEEE1': 'orange-01', '#FEE0C8': 'orange-02', '#FFC89E': 'orange-03',
      '#FF9340': 'orange-04', '#F97514': 'orange-05', '#C95908': 'orange-06',
      '#9E3F00': 'orange-07', '#593217': 'orange-08', '#432410': 'orange-09',
      '#FEECF3': 'pink-01', '#FDDDEA': 'pink-02', '#FFBFDA': 'pink-03',
      '#FF73AD': 'pink-04', '#FA4B94': 'pink-05', '#E0387E': 'pink-06',
      '#B81C5D': 'pink-07', '#642640': 'pink-08', '#4E1B30': 'pink-09',
      '#F5F0FF': 'purple-01', '#E8DDFE': 'purple-02', '#D8C4FF': 'purple-03',
      '#B28CFF': 'purple-04', '#9B69FF': 'purple-05', '#864AFF': 'purple-06',
      '#6238B5': 'purple-07', '#45297D': 'purple-08', '#2F1E5A': 'purple-09',
      '#FFF3CC': 'yellow-01', '#FFE59E': 'yellow-02', '#FFD269': 'yellow-03',
      '#F5A300': 'yellow-04', '#CF8300': 'yellow-05', '#B06A00': 'yellow-06',
      '#874D00': 'yellow-07', '#523817': 'yellow-08', '#3A2D12': 'yellow-09'
    };

    function rgbToHex(rgb) {
      const match = rgb.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
      if (match) {
        const r = parseInt(match[1]).toString(16).padStart(2, '0');
        const g = parseInt(match[2]).toString(16).padStart(2, '0');
        const b = parseInt(match[3]).toString(16).padStart(2, '0');
        return '#' + r.toUpperCase() + g.toUpperCase() + b.toUpperCase();
      }
      return null;
    }

    function getTokenInfo(tokenName) {
      const computedStyle = getComputedStyle(document.documentElement);
      const value = computedStyle.getPropertyValue(tokenName).trim();
      
      let displayValue = '';
      let rawColor = null;
      
      // Parse the value to get the raw color (without transparency)
      if (value.startsWith('rgba(')) {
        const hex = rgbToHex(value);
        if (hex && paletteColors[hex]) {
          displayValue = paletteColors[hex];
        } else if (hex) {
          displayValue = hex;
        }
        rawColor = hex;
      } else if (value.startsWith('rgb(')) {
        const hex = rgbToHex(value);
        if (hex && paletteColors[hex]) {
          displayValue = paletteColors[hex];
        } else if (hex) {
          displayValue = hex;
        }
        rawColor = hex;
      } else if (value.startsWith('#')) {
        const hex = value.toUpperCase();
        if (paletteColors[hex]) {
          displayValue = paletteColors[hex];
        } else {
          displayValue = hex;
        }
        rawColor = hex;
      }
      
      return {
        tokenColor: value, // The full token value (with transparency)
        displayValue: displayValue, // The palette name or hex
        rawColor: rawColor // The raw color for the swatch
      };
    }

    function formatTokenName(tokenName) {
      // Convert --surface-primary to surface-primary
      return tokenName.replace('--', '');
    }

    // Helper element for color parsing (lazy init)
    let colorHelper = null;

    function parseColor(color) {
      // Create helper on first use
      if (!colorHelper) {
        colorHelper = document.createElement('div');
        colorHelper.style.display = 'none';
        document.body.appendChild(colorHelper);
      }
      
      // Use a DOM element to parse any CSS color format reliably
      colorHelper.style.backgroundColor = '';
      colorHelper.style.backgroundColor = color;
      const computed = getComputedStyle(colorHelper).backgroundColor;
      
      // Try rgb/rgba format first (most common)
      let match = computed.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*(?:,\s*([\d.]+)\s*)?\)/);
      if (match) {
        return {
          r: parseInt(match[1]),
          g: parseInt(match[2]),
          b: parseInt(match[3]),
          a: match[4] !== undefined ? parseFloat(match[4]) : 1
        };
      }
      
      // Try modern space-separated rgb format: rgb(255 255 255) or rgb(255 255 255 / 0.5)
      match = computed.match(/rgba?\(\s*(\d+)\s+(\d+)\s+(\d+)(?:\s*\/\s*([\d.]+%?))?\s*\)/);
      if (match) {
        let alpha = 1;
        if (match[4]) {
          alpha = match[4].endsWith('%') ? parseFloat(match[4]) / 100 : parseFloat(match[4]);
        }
        return {
          r: parseInt(match[1]),
          g: parseInt(match[2]),
          b: parseInt(match[3]),
          a: alpha
        };
      }
      
      // Try color(srgb ...) format
      match = computed.match(/color\(srgb\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)(?:\s*\/\s*([\d.]+))?\)/);
      if (match) {
        return {
          r: Math.round(parseFloat(match[1]) * 255),
          g: Math.round(parseFloat(match[2]) * 255),
          b: Math.round(parseFloat(match[3]) * 255),
          a: match[4] !== undefined ? parseFloat(match[4]) : 1
        };
      }
      
      // Fallback for any edge cases
      return { r: 128, g: 128, b: 128, a: 1 };
    }

    function blendWithBackground(fgColor, bgColor) {
      // Alpha composite: result = fg * a + bg * (1 - a)
      const a = fgColor.a;
      return {
        r: Math.round(fgColor.r * a + bgColor.r * (1 - a)),
        g: Math.round(fgColor.g * a + bgColor.g * (1 - a)),
        b: Math.round(fgColor.b * a + bgColor.b * (1 - a)),
        a: 1
      };
    }

    function getLuminance(r, g, b) {
      // Convert to 0-1 range
      const rs = r / 255;
      const gs = g / 255;
      const bs = b / 255;
      
      const toLinear = (c) => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
      return 0.2126 * toLinear(rs) + 0.7152 * toLinear(gs) + 0.0722 * toLinear(bs);
    }

    function getTextColor(tokenColor) {
      const fg = parseColor(tokenColor);
      
      // Get the page background color based on theme
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const pageBg = isDark 
        ? { r: 32, g: 33, b: 36, a: 1 }   // --surface-primary dark mode (~grey-15)
        : { r: 255, g: 255, b: 255, a: 1 }; // --surface-primary light mode (white)
      
      // Blend the token color with the page background
      const blended = blendWithBackground(fg, pageBg);
      
      // Calculate luminance of the blended result
      const luminance = getLuminance(blended.r, blended.g, blended.b);
      
      // Use a threshold of 0.4 for better contrast
      return luminance > 0.4 ? '#000000' : '#FFFFFF';
    }

    function copyToken(tokenName) {
      navigator.clipboard.writeText(tokenName).then(() => {
        showToast(`Copied ${tokenName}`);
      }).catch(err => {
        console.error('Failed to copy:', err);
      });
    }

    function showToast(message) {
      const toast = document.getElementById('token-toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    function createTokenRow(tokenName) {
      const info = getTokenInfo(tokenName);
      const textColor = getTextColor(info.tokenColor);
      const displayName = formatTokenName(tokenName);
      
      return `
        <div class="token-row text-body" 
             style="background-color: ${info.tokenColor}; color: ${textColor};" 
             onclick="copyToken('${tokenName}')">
          <span class="token-name">${displayName}</span>
          <div class="token-value-wrapper">
            <span>${info.displayValue}</span>
            ${info.rawColor ? `<span class="token-swatch" style="background-color: ${info.rawColor};"></span>` : ''}
          </div>
        </div>
      `;
    }

    function renderTokens() {
      const container = document.getElementById('tokens-container');
      let html = '';

      Object.keys(tokenCategories).forEach(category => {
        html += `
          <div class="component-group">
            <div class="component-label text-caption">${category}</div>
            <div class="color-list">
        `;
        
        tokenCategories[category].forEach(token => {
          html += createTokenRow(token);
        });
        
        html += `
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    // Render on page load
    renderTokens();

    // Re-render when theme changes
    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        if (mutation.attributeName === 'data-theme') {
          renderTokens();
        }
      });
    });
    observer.observe(document.documentElement, { attributes: true });
  </script>
</body>
</html>
