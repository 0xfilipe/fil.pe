<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chip - Design System</title>
  <link rel="stylesheet" href="../tokens/colors.css">
  <link rel="stylesheet" href="../tokens/typography.css">
  <link rel="stylesheet" href="../tokens/shadows.css">
  <link rel="stylesheet" href="../components/chip.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--surface-tertiary);
      color: var(--content-primary);
      padding: 0;
      min-height: 100vh;
    }

    .theme-toggle-wrapper {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      z-index: 100;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-toggle {
      width: 24px;
      height: 16px;
      background-color: var(--stroke-border-strong);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      padding: 2px 2px 2px 2px;
      padding-right: 2px;
    }

    [data-theme="dark"] .theme-toggle {
      background-color: var(--button-accent);
    }

    .theme-toggle-slider {
      width: 12px;
      height: 12px;
      background-color: var(--content-on-accent);
      border-radius: 50%;
      transition: transform 0.2s ease;
      position: absolute;
      top: 50%;
      left: 2px;
      transform: translateY(-50%);
    }

    [data-theme="dark"] .theme-toggle-slider {
      transform: translateY(-50%) translateX(8px);
    }

    .theme-toggle-label {
      color: var(--content-quaternary);
      user-select: none;
      transition: color 0.2s ease;
    }

    [data-theme="dark"] .theme-toggle-label {
      color: var(--content-primary);
    }

    .container {
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      padding: 160px 20px 88px 20px;
    }

    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      text-decoration: none;
      color: var(--content-tertiary);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      z-index: 100;
    }

    .back-button svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .back-button svg path {
      fill: currentColor;
    }

    .page-title {
      margin-top: 0;
      margin-bottom: 48px;
    }

    .components-section {
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    .component-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .component-label {
      color: var(--content-tertiary);
    }

    .component-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 48px;
      align-items: flex-start;
      width: 100%;
      max-width: 680px;
    }
  </style>
</head>
<body>
  <div class="theme-toggle-wrapper">
    <div class="toggle-group">
      <span class="theme-toggle-label text-caption">Dark Mode</span>
      <button class="theme-toggle" onclick="toggleTheme()">
        <div class="theme-toggle-slider"></div>
      </button>
    </div>
  </div>

  <a href="../index.html" class="back-button text-caption">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5.72424 3.08191C5.9182 2.95382 6.18228 2.97579 6.35315 3.14636C6.52401 3.31723 6.54577 3.58119 6.4176 3.77527L6.35315 3.85339L3.70667 6.49988H11.4996C11.7757 6.49988 11.9995 6.72381 11.9996 6.99988C11.9996 7.27602 11.7758 7.49988 11.4996 7.49988H3.70667L6.35315 10.1464C6.54841 10.3416 6.54841 10.6581 6.35315 10.8534C6.15788 11.0485 5.84133 11.0486 5.64612 10.8534L2.14612 7.35339L2.08167 7.27527C1.95378 7.08128 1.97549 6.81713 2.14612 6.64636L5.64612 3.14636L5.72424 3.08191Z" fill="currentColor"/>
    </svg>
    Back
  </a>

  <div class="container">
    <h1 class="page-title text-title-small">Chip</h1>

    <div class="components-section">
      <div class="component-group">
        <div class="component-label text-caption">Default</div>
        <div class="component-row">
          <button class="chip chip-ghost">
            <img src="../assets/cursor.png" alt="" class="chip-avatar" />
            <span class="chip-text">John Doe</span>
          </button>
          <button class="chip chip-ghost">
            <img src="../assets/cursor.png" alt="" class="chip-avatar-square" />
            <span class="chip-text">John Doe</span>
          </button>
        </div>
      </div>

      <div class="component-group">
        <div class="component-label text-caption">With Link</div>
        <div class="component-row">
          <button class="chip chip-ghost">
            <img src="../assets/cursor.png" alt="" class="chip-avatar" />
            <span class="chip-text chip-text-link">John Doe</span>
          </button>
          <button class="chip chip-ghost">
            <img src="../assets/cursor.png" alt="" class="chip-avatar-square" />
            <span class="chip-text chip-text-link">John Doe</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('theme') || 
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</body>
</html>
