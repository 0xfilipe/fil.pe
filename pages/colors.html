<body>

  <a href="../index.html" class="back-button text-caption">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">

    Back
  </a>

  <div class="container">
    <h1 class="page-title text-title">Palette</h1>

    <div class="components-section" id="colors-container"></div>
  </div>

  <div id="color-toast" class="toast text-caption"></div>

  <script src="../scripts/script.js"></script>
  <script>
    // Color palettes data
    const colorPalettes = {
      'Grey': ['00', '01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12', '13', '14', '15', '16', '17', '18'],
      'Blue': ['01', '02', '03', '04', '05', '06', '07', '08', '09'],
      'Red': ['01', '02', '03', '04', '05', '06', '07', '08', '09'],
      'Amber': ['01', '02', '03', '04', '05', '06', '07', '08', '09'],
      'Green': ['01', '02', '03', '04', '05', '06', '07', '08', '09'],
      'Cyan': ['01', '02', '03', '04', '05', '06', '07', '08', '09'],
      'Lavender': ['01', '02', '03', '04', '05', '06', '07', '08', '09'],
      'Lime': ['01', '02', '03', '04', '05', '06', '07', '08', '09'],
      'Orange': ['01', '02', '03', '04', '05', '06', '07', '08', '09'],
      'Pink': ['01', '02', '03', '04', '05', '06', '07', '08', '09'],
      'Purple': ['01', '02', '03', '04', '05', '06', '07', '08', '09'],
      'Yellow': ['01', '02', '03', '04', '05', '06', '07', '08', '09']
    };

    // Color hex values mapping
    const colorHexValues = {
      'grey-00': '#FFFFFF', 'grey-01': '#FBFBFB', 'grey-02': '#F8F9FA', 'grey-03': '#F1F2F3',
      'grey-04': '#EEEFF1', 'grey-05': '#E6E7EA', 'grey-06': '#CDCED2', 'grey-07': '#A2A4A7',
      'grey-08': '#898A8D', 'grey-09': '#77797C', 'grey-10': '#505155', 'grey-11': '#45474B',
      'grey-12': '#2F3033', 'grey-13': '#292A2E', 'grey-14': '#242629', 'grey-15': '#202124',
      'grey-16': '#1C1D1F', 'grey-17': '#17181A', 'grey-18': '#000000',
      'blue-01': '#E5EEFF', 'blue-02': '#D6E5FF', 'blue-03': '#C2D6FF', 'blue-04': '#80ACFF',
      'blue-05': '#4E8CFC', 'blue-06': '#266DF0', 'blue-07': '#215BC4', 'blue-08': '#2B3E6D', 'blue-09': '#1D2E55',
      'red-01': '#FFEBEB', 'red-02': '#FFDCDB', 'red-03': '#FFD1D1', 'red-04': '#FF8180',
      'red-05': '#FF5454', 'red-06': '#ED3B3B', 'red-07': '#BA2525', 'red-08': '#692623', 'red-09': '#4E1B28',
      'amber-01': '#FDF7C4', 'amber-02': '#FCEF7E', 'amber-03': '#F5E242', 'amber-04': '#CFB700',
      'amber-05': '#A89500', 'amber-06': '#8C7D00', 'amber-07': '#665A00', 'amber-08': '#423E17', 'amber-09': '#373313',
      'green-01': '#E0FCED', 'green-02': '#CBF7E1', 'green-03': '#A7F2CF', 'green-04': '#4AD99A',
      'green-05': '#00D17E', 'green-06': '#02AD6E', 'green-07': '#007D53', 'green-08': '#244A3A', 'green-09': '#1D4034',
      'cyan-01': '#DDF7FF', 'cyan-02': '#D0EFF7', 'cyan-03': '#A9EBFC', 'cyan-04': '#40CFF5',
      'cyan-05': '#00B9EB', 'cyan-06': '#0D99BD', 'cyan-07': '#056C87', 'cyan-08': '#0A4E6B', 'cyan-09': '#1A3946',
      'lavender-01': '#FDEDFF', 'lavender-02': '#FAD6FF', 'lavender-03': '#F6BDFC', 'lavender-04': '#F16BFF',
      'lavender-05': '#DB4BEB', 'lavender-06': '#CD33DE', 'lavender-07': '#9C1BAB', 'lavender-08': '#5C2169', 'lavender-09': '#431B4B',
      'lime-01': '#F4FBCB', 'lime-02': '#E9F797', 'lime-03': '#D7EB67', 'lime-04': '#AABF2A',
      'lime-05': '#89A100', 'lime-06': '#748700', 'lime-07': '#536300', 'lime-08': '#3B4217', 'lime-09': '#2F3802',
      'orange-01': '#FEEEE1', 'orange-02': '#FEE0C8', 'orange-03': '#FFC89E', 'orange-04': '#FF9340',
      'orange-05': '#F97514', 'orange-06': '#C95908', 'orange-07': '#9E3F00', 'orange-08': '#593217', 'orange-09': '#432410',
      'pink-01': '#FEECF3', 'pink-02': '#FDDDEA', 'pink-03': '#FFBFDA', 'pink-04': '#FF73AD',
      'pink-05': '#FA4B94', 'pink-06': '#E0387E', 'pink-07': '#B81C5D', 'pink-08': '#642640', 'pink-09': '#4E1B30',
      'purple-01': '#F5F0FF', 'purple-02': '#E8DDFE', 'purple-03': '#D8C4FF', 'purple-04': '#B28CFF',
      'purple-05': '#9B69FF', 'purple-06': '#864AFF', 'purple-07': '#6238B5', 'purple-08': '#45297D', 'purple-09': '#2F1E5A',
      'yellow-01': '#FFF3CC', 'yellow-02': '#FFE59E', 'yellow-03': '#FFD269', 'yellow-04': '#F5A300',
      'yellow-05': '#CF8300', 'yellow-06': '#B06A00', 'yellow-07': '#874D00', 'yellow-08': '#523817', 'yellow-09': '#3A2D12'
    };

    function getColorHex(palette, index) {
      const key = `${palette.toLowerCase()}-${index}`;
      return colorHexValues[key] || '';
    }

    function getLuminance(hex) {
      const rgb = hex.match(/\w\w/g).map(x => parseInt(x, 16));
      const [r, g, b] = rgb.map(val => {
        val = val / 255;
        return val <= 0.03928 ? val / 12.92 : Math.pow((val + 0.055) / 1.055, 2.4);
      });
      return 0.2126 * r + 0.7152 * g + 0.0722 * b;
    }

    function getTextColor(hex) {
      const luminance = getLuminance(hex);
      return luminance > 0.5 ? '#000000' : '#FFFFFF';
    }

    function createColorRow(palette, index) {
      const hexValue = getColorHex(palette, index);
      const textColor = getTextColor(hexValue);
      
      return `
        <div class="color-row text-body" style="background-color: ${hexValue}; color: ${textColor};" onclick="copyColorCode('${hexValue}')">
          <span>${index}</span>
          <span>${hexValue}</span>
        </div>
      `;
    }

    function copyColorCode(hexValue) {
      navigator.clipboard.writeText(hexValue).then(() => {
        showToast(`Copied ${hexValue}`);
      }).catch(err => {
        console.error('Failed to copy:', err);
      });
    }

    function showToast(message) {
      const toast = document.getElementById('color-toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    function renderPalettes() {
      const container = document.getElementById('colors-container');
      let html = '';

      Object.keys(colorPalettes).forEach(paletteName => {
        html += `
          <div class="component-group">
            <div class="component-label text-caption">${paletteName}</div>
            <div class="color-list">
        `;
        
        colorPalettes[paletteName].forEach(index => {
          html += createColorRow(paletteName, index);
        });
        
        html += `
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    // Render palettes on page load
    renderPalettes();
  </script>
</body>
</html>
