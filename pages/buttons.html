<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buttons - Design System</title>
  <link rel="stylesheet" href="../tokens/colors.css">
  <link rel="stylesheet" href="../tokens/typography.css">
  <link rel="stylesheet" href="../tokens/shadows.css">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../components/button.css">
  <style>
    /* Page-specific styles */
    .theme-toggle-wrapper {
      flex-direction: column;
      align-items: flex-end;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-toggle {
      width: 24px;
      height: 16px;
      background-color: var(--stroke-border-strong);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      padding: 2px;
    }

    .icon-toggle.active {
      background-color: var(--button-accent);
    }

    .icon-toggle-slider {
      width: 12px;
      height: 12px;
      background-color: var(--content-on-accent);
      border-radius: 50%;
      transition: transform 0.2s ease;
      position: absolute;
      top: 50%;
      left: 2px;
      transform: translateY(-50%);
    }

    .icon-toggle.active .icon-toggle-slider {
      transform: translateY(-50%) translateX(8px);
    }

    /* Hide icons when toggles are off */
    .hide-left-icon .btn-icon-left {
      display: none;
    }

    .hide-right-icon .btn-icon-right {
      display: none;
    }

    .component-group {
      gap: 24px;
    }

    .component-label {
      color: var(--content-tertiary);
    }

    .component-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 40px;
      align-items: flex-start;
      width: 100%;
      max-width: 680px;
    }
  </style>
</head>
<body>
  <div class="theme-toggle-wrapper">
    <div class="toggle-group">
      <span class="theme-toggle-label text-caption">Dark Mode</span>
      <button class="theme-toggle" onclick="toggleTheme()">
        <div class="theme-toggle-slider"></div>
      </button>
    </div>
    <div class="toggle-group">
      <span class="theme-toggle-label text-caption">Left Icon</span>
      <button class="icon-toggle active" id="leftIconToggle" onclick="toggleLeftIcon()">
        <div class="icon-toggle-slider"></div>
      </button>
    </div>
    <div class="toggle-group">
      <span class="theme-toggle-label text-caption">Right Icon</span>
      <button class="icon-toggle active" id="rightIconToggle" onclick="toggleRightIcon()">
        <div class="icon-toggle-slider"></div>
      </button>
    </div>
  </div>

  <script>
    // Page-specific: Icon visibility toggles
    function toggleLeftIcon() {
      const toggle = document.getElementById('leftIconToggle');
      const body = document.body;
      toggle.classList.toggle('active');
      body.classList.toggle('hide-left-icon');
      localStorage.setItem('leftIconVisible', toggle.classList.contains('active'));
    }

    function toggleRightIcon() {
      const toggle = document.getElementById('rightIconToggle');
      const body = document.body;
      toggle.classList.toggle('active');
      body.classList.toggle('hide-right-icon');
      localStorage.setItem('rightIconVisible', toggle.classList.contains('active'));
    }

    // Load saved icon visibility states
    const leftIconVisible = localStorage.getItem('leftIconVisible') !== 'false';
    const rightIconVisible = localStorage.getItem('rightIconVisible') !== 'false';
    
    if (!leftIconVisible) {
      document.getElementById('leftIconToggle').classList.remove('active');
      document.body.classList.add('hide-left-icon');
    }
    
    if (!rightIconVisible) {
      document.getElementById('rightIconToggle').classList.remove('active');
      document.body.classList.add('hide-right-icon');
    }
  </script>
